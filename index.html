<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 簽到異常偵測系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --bg-color: #f0f2f5;
            --error-bg: #fff1f0;
            --error-text: #f5222d;
            --success-bg: #f6ffed;
            --success-text: #52c41a;
            --border-radius: 12px;
        }

        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 40px 20px; color: #333;
        }

        .container { 
            max-width: 1000px; margin: auto; background: white; padding: 30px; 
            border-radius: var(--border-radius); box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }

        .status { 
            display: inline-block; padding: 6px 16px; border-radius: 20px; 
            font-size: 0.9em; margin-bottom: 25px; font-weight: 500;
        }
        .loading { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
        .ready { background: var(--success-bg); color: var(--success-text); border: 1px solid #b7eb8f; }
        .error { background: var(--error-bg); color: var(--error-text); border: 1px solid #ffa39e; }

        /* 檔案上傳區 */
        .upload-section {
            border: 2px dashed #d9d9d9; border-radius: var(--border-radius);
            padding: 30px; text-align: center; background: #fafafa;
            transition: all 0.3s; cursor: pointer; margin-bottom: 20px;
        }
        .upload-section.has-file { border-color: var(--primary-color); background: #f0f7ff; }
        .upload-section.invalid-file { border-color: var(--error-text); background: var(--error-bg); }
        .upload-section i { font-size: 32px; color: var(--primary-color); margin-bottom: 10px; }
        #excelFile { display: none; }
        
        /* 控制列 */
        .controls {
            display: flex; align-items: center; justify-content: space-between;
            gap: 15px; padding: 20px; background: #f8f9fa; border-radius: 8px; margin-bottom: 30px;
        }

        .btn-detect {
            background-color: var(--primary-color); color: white; border: none;
            padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-detect:disabled { background-color: #d9d9d9; cursor: not-allowed; }

        /* 錯誤訊息 */
        #errorLog {
            color: var(--error-text); background: var(--error-bg);
            padding: 15px; border-radius: 6px; margin-bottom: 20px;
            display: none; font-size: 0.9em; border: 1px solid #ffa39e;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background-color: #fafafa; padding: 15px; text-align: left; border-bottom: 2px solid #f0f0f0; color: #8c8c8c; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .tag { padding: 4px 10px; border-radius: 4px; font-size: 0.85em; font-weight: 500; }
        .tag-normal { background: var(--success-bg); color: var(--success-text); }
        .tag-anomaly { background: var(--error-bg); color: var(--error-text); }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-shield-alt"></i> 簽到紀錄 AI 異常偵測</h2>
    
    <div id="modelStatus" class="status loading">
        <i class="fas fa-spinner fa-spin"></i> 正在初始化 AI 模型...
    </div>

    <div id="errorLog"></div>

    <div class="upload-section" id="dropZone" onclick="document.getElementById('excelFile').click()">
        <i class="fas fa-file-import"></i>
        <div id="fileNameDisplay" style="font-size: 1.1em; font-weight: 500;">點擊上傳 Excel 檔案</div>
        <div style="color: #8c8c8c; font-size: 0.85em; margin-top: 5px;">系統將檢查：姓名、簽到時間、簽退時間</div>
        <input type="file" id="excelFile" accept=".xlsx, .xls" disabled>
    </div>

    <div class="controls">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-cog"></i>
            <label>靈敏度:</label>
            <input type="number" id="threshold" value="0.1" step="0.01" style="width:70px; padding:8px; border-radius:4px; border:1px solid #ddd;">
        </div>
        
        <button id="detectBtn" class="btn-detect" disabled>
            <i class="fas fa-search"></i> 執行偵測
        </button>
    </div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>頁籤</th>
                <th>姓名</th>
                <th>簽到/簽退</th>
                <th>時數</th>
                <th>誤差值</th>
                <th>結果</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    let model;
    let pendingData = [];
    const REQUIRED_COLUMNS = ['姓名', '簽到時間', '簽退時間']; // 定義必要欄位

    const modelStatus = document.getElementById('modelStatus');
    const excelFileInput = document.getElementById('excelFile');
    const detectBtn = document.getElementById('detectBtn');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const dropZone = document.getElementById('dropZone');
    const errorLog = document.getElementById('errorLog');

    async function init() {
        try {
            model = await tf.loadLayersModel('model.json');
            modelStatus.innerHTML = '<i class="fas fa-check-circle"></i> 模型就緒';
            modelStatus.className = 'status ready';
            excelFileInput.disabled = false;
        } catch (e) {
            modelStatus.innerHTML = '<i class="fas fa-times-circle"></i> 模型載入失敗';
            modelStatus.className = 'status error';
        }
    }

    // 核心檢核邏輯
    function validateData(data) {
        if (!data || data.length === 0) return "檔案內容為空";
        
        // 檢查第一筆資料是否包含所有必要欄位
        const firstRow = data[0];
        const keys = Object.keys(firstRow);
        const missing = REQUIRED_COLUMNS.filter(col => !keys.includes(col));
        
        if (missing.length > 0) {
            return `格式錯誤：缺少必要欄位 [${missing.join(', ')}]。請檢查 Excel 標題列名稱是否正確。`;
        }
        return null; // 代表沒問題
    }

    excelFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        errorLog.style.display = 'none';
        dropZone.classList.remove('invalid-file', 'has-file');

        const reader = new FileReader();
        reader.onload = function(ev) {
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            let combinedData = [];

            // 讀取所有頁籤
            workbook.SheetNames.forEach(name => {
                const sheet = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
                combinedData = combinedData.concat(sheet.map(row => ({ ...row, _sheet: name })));
            });

            // 執行格式檢核
            const errorMsg = validateData(combinedData);
            if (errorMsg) {
                errorLog.innerText = errorMsg;
                errorLog.style.display = 'block';
                dropZone.classList.add('invalid-file');
                fileNameDisplay.innerText = "檔案格式不正確";
                detectBtn.disabled = true;
                return;
            }

            // 通過檢核
            pendingData = combinedData;
            fileNameDisplay.innerText = `已讀取：${file.name} (共 ${pendingData.length} 筆)`;
            dropZone.classList.add('has-file');
            detectBtn.disabled = false;
        };
        reader.readAsArrayBuffer(file);
    });

    detectBtn.addEventListener('click', () => runDetection(pendingData));

    function preprocess(checkIn, checkOut, duration) {
        const parseTime = (timeStr) => {
            if (!timeStr) return 0;
            const timeParts = String(timeStr).match(/(\d{1,2}):(\d{1,2})/);
            if (!timeParts) return 0;
            return (parseInt(timeParts[1]) + parseInt(timeParts[2]) / 60) / 24;
        };
        return [parseTime(checkIn), parseTime(checkOut), (parseFloat(duration) || 0) / 4];
    }

    function runDetection(data) {
        const tbody = document.getElementById('resultBody');
        const threshold = parseFloat(document.getElementById('threshold').value);
        tbody.innerHTML = '';
        document.getElementById('resultTable').style.display = 'table';
        
        data.forEach(row => {
            const features = preprocess(row['簽到時間'], row['簽退時間'], row['簽到時數'] || row['時數']);
            const inputTensor = tf.tensor2d([features]);
            const mse = tf.losses.meanSquaredError(inputTensor, model.predict(inputTensor)).dataSync()[0];
            const isAnomaly = mse > threshold;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:#8c8c8c; font-size:0.85em;">${row._sheet}</td>
                <td><b>${row['姓名']}</b></td>
                <td>${row['簽到時間']} - ${row['簽退時間']}</td>
                <td>${row['簽到時數'] || row['時數'] || '-'}</td>
                <td style="font-family:monospace;">${mse.toFixed(5)}</td>
                <td><span class="tag ${isAnomaly ? 'tag-anomaly' : 'tag-normal'}">${isAnomaly ? '🚨 異常' : '✅ 正常'}</span></td>
            `;
            tbody.appendChild(tr);
        });
    }

    init();
</script>
</body>
</html>
