<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 簽到異常偵測系統 (進階版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --bg-color: #f0f2f5;
            --error-bg: #fff1f0;
            --error-text: #f5222d;
            --success-bg: #f6ffed;
            --success-text: #52c41a;
            --border-radius: 12px;
        }

        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 40px 20px; color: #333;
        }

        .container { 
            max-width: 1000px; margin: auto; background: white; padding: 30px; 
            border-radius: var(--border-radius); box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }

        /* 標題與模型載入區 */
        .header-flex { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        
        .status { 
            display: inline-block; padding: 6px 16px; border-radius: 20px; 
            font-size: 0.9em; font-weight: 500; margin-top: 10px;
        }
        .waiting { background: #e8e8e8; color: #8c8c8c; border: 1px solid #d9d9d9; }
        .loading { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
        .ready { background: var(--success-bg); color: var(--success-text); border: 1px solid #b7eb8f; }
        .error { background: var(--error-bg); color: var(--error-text); border: 1px solid #ffa39e; }

        .btn-load-model {
            background-color: #555; color: white; border: none; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn-load-model:hover { background-color: #333; }
        .btn-load-model:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 檔案上傳區 */
        .upload-section {
            border: 2px dashed #d9d9d9; border-radius: var(--border-radius);
            padding: 30px; text-align: center; background: #fafafa;
            transition: all 0.3s; cursor: pointer; margin-bottom: 20px;
        }
        .upload-section.has-file { border-color: var(--primary-color); background: #f0f7ff; }
        .upload-section.invalid-file { border-color: var(--error-text); background: var(--error-bg); }
        .upload-section i { font-size: 32px; color: var(--primary-color); margin-bottom: 10px; }
        #excelFile { display: none; }
        
        /* 控制列 */
        .controls {
            display: grid; grid-template-columns: 1fr 1fr auto; align-items: center;
            gap: 25px; padding: 25px; background: #f8f9fa; border-radius: 8px; margin-bottom: 30px;
        }

        /* 滑動桿樣式 */
        .slider-container { display: flex; flex-direction: column; gap: 8px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 0.9em; font-weight: 600; }
        input[type="range"] { width: 100%; cursor: pointer; }

        .btn-detect {
            background-color: var(--primary-color); color: white; border: none;
            padding: 15px 30px; border-radius: 6px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px; font-size: 1.1em;
        }
        .btn-detect:disabled { background-color: #d9d9d9; cursor: not-allowed; }

        #errorLog {
            color: var(--error-text); background: var(--error-bg);
            padding: 15px; border-radius: 6px; margin-bottom: 20px;
            display: none; font-size: 0.9em; border: 1px solid #ffa39e;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background-color: #fafafa; padding: 15px; text-align: left; border-bottom: 2px solid #f0f0f0; color: #8c8c8c; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .tag { padding: 4px 10px; border-radius: 4px; font-size: 0.85em; font-weight: 500; }
        .tag-normal { background: var(--success-bg); color: var(--success-text); }
        .tag-anomaly { background: var(--error-bg); color: var(--error-text); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <div>
            <h2><i class="fas fa-microchip"></i> 簽到紀錄 AI 異常偵測</h2>
            <div id="modelStatus" class="status waiting">系統狀態：等待載入模型</div>
        </div>
        <button id="loadModelBtn" class="btn-load-model">
            <i class="fas fa-download"></i> 1. 載入 AI 模型
        </button>
    </div>

    <div id="errorLog"></div>

    <div class="upload-section" id="dropZone" onclick="document.getElementById('excelFile').click()">
        <i class="fas fa-file-excel"></i>
        <div id="fileNameDisplay" style="font-size: 1.1em; font-weight: 500;">2. 點擊上傳 Excel 檔案</div>
        <div style="color: #8c8c8c; font-size: 0.85em; margin-top: 5px;">必須包含：員工編號、簽到時間、簽退時間</div>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
    </div>

    <div class="controls">
        <div class="slider-container">
            <div class="slider-header">
                <span><i class="fas fa-sliders-h"></i> 靈敏度閥值 (MSE)</span>
                <span id="thresholdValue" style="color: var(--primary-color);">0.100</span>
            </div>
            <input type="range" id="threshold" min="0.001" max="0.5" step="0.001" value="0.1">
            <div style="display: flex; justify-content: space-between; font-size: 0.75em; color: #999;">
                <span>更靈敏 (嚴格)</span>
                <span>更寬鬆 (放行)</span>
            </div>
        </div>

        <div style="color: #8c8c8c; font-size: 0.85em; line-height: 1.4;">
            ※ 調整閥值決定 AI 判定異常的標準。<br>越小越容易抓出細微偏差。
        </div>
        
        <button id="detectBtn" class="btn-detect" disabled>
            <i class="fas fa-search"></i> 3. 執行偵測
        </button>
    </div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>頁籤</th>
                <th>員工編號</th>
                <th>簽到 / 簽退</th>
                <th>時數</th>
                <th>誤差值 (MSE)</th>
                <th>判定結果</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    let model;
    let pendingData = [];
    const REQUIRED_COLUMNS = ['員工編號', '簽到時間', '簽退時間']; 

    const modelStatus = document.getElementById('modelStatus');
    const loadModelBtn = document.getElementById('loadModelBtn');
    const excelFileInput = document.getElementById('excelFile');
    const detectBtn = document.getElementById('detectBtn');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const dropZone = document.getElementById('dropZone');
    const errorLog = document.getElementById('errorLog');
    const thresholdSlider = document.getElementById('threshold');
    const thresholdValueDisp = document.getElementById('thresholdValue');

    // --- 1. 載入模型邏輯 ---
    loadModelBtn.addEventListener('click', async () => {
        loadModelBtn.disabled = true;
        modelStatus.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 模型載入中...';
        modelStatus.className = 'status loading';

        try {
            // 載入與此 HTML 同目錄下的模型
            model = await tf.loadLayersModel('model.json');
            modelStatus.innerHTML = '<i class="fas fa-check-circle"></i> AI 模型載入成功';
            modelStatus.className = 'status ready';
            loadModelBtn.innerHTML = '<i class="fas fa-check"></i> 模型已就緒';
            checkReadyState();
        } catch (e) {
            modelStatus.innerHTML = '<i class="fas fa-times-circle"></i> 模型檔案讀取失敗 (需透過 Server 開啟)';
            modelStatus.className = 'status error';
            loadModelBtn.disabled = false;
        }
    });

    // --- 2. 滑動桿同步顯示 ---
    thresholdSlider.addEventListener('input', (e) => {
        thresholdValueDisp.innerText = parseFloat(e.target.value).toFixed(3);
    });

    // --- 3. 檢查是否可以開始偵測 ---
    function checkReadyState() {
        if (model && pendingData.length > 0) {
            detectBtn.disabled = false;
        }
    }

    // --- 4. 檔案讀取邏輯 ---
    excelFileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        errorLog.style.display = 'none';
        dropZone.classList.remove('invalid-file', 'has-file');

        const reader = new FileReader();
        reader.onload = function(ev) {
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            let combinedData = [];

            workbook.SheetNames.forEach(name => {
                const sheet = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
                combinedData = combinedData.concat(sheet.map(row => ({ ...row, _sheet: name })));
            });

            // 格式檢核
            if (combinedData.length === 0) {
                showError("檔案內容為空");
                return;
            }
            const keys = Object.keys(combinedData[0]);
            const missing = REQUIRED_COLUMNS.filter(col => !keys.includes(col));
            if (missing.length > 0) {
                showError(`缺少欄位：${missing.join(', ')}`);
                return;
            }

            pendingData = combinedData;
            fileNameDisplay.innerText = `已讀取：${file.name} (${pendingData.length} 筆)`;
            dropZone.classList.add('has-file');
            checkReadyState();
        };
        reader.readAsArrayBuffer(file);
    });

    function showError(msg) {
        errorLog.innerText = msg;
        errorLog.style.display = 'block';
        dropZone.classList.add('invalid-file');
        fileNameDisplay.innerText = "格式錯誤";
    }

    // --- 5. 偵測與特徵工程 ---
    detectBtn.addEventListener('click', () => runDetection(pendingData));

    function preprocess(checkIn, checkOut, duration) {
        const parseTime = (timeStr) => {
            if (!timeStr) return 0;
            const timeParts = String(timeStr).match(/(\d{1,2}):(\d{1,2})/);
            if (!timeParts) return 0;
            return (parseInt(timeParts[1]) + parseInt(timeParts[2]) / 60) / 24;
        };
        return [parseTime(checkIn), parseTime(checkOut), (parseFloat(duration) || 0) / 4];
    }

    function runDetection(data) {
        const tbody = document.getElementById('resultBody');
        const threshold = parseFloat(thresholdSlider.value);
        tbody.innerHTML = '';
        document.getElementById('resultTable').style.display = 'table';
        
        data.forEach(row => {
            const features = preprocess(row['簽到時間'], row['簽退時間'], row['簽到時數'] || row['時數']);
            const inputTensor = tf.tensor2d([features]);
            const mse = tf.losses.meanSquaredError(inputTensor, model.predict(inputTensor)).dataSync()[0];
            const isAnomaly = mse > threshold;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:#8c8c8c; font-size:0.85em;">${row._sheet}</td>
                <td style="font-weight:600;">${row['員工編號']}</td>
                <td>${row['簽到時間']} - ${row['簽退時間']}</td>
                <td>${row['簽到時數'] || row['時數'] || '-'}</td>
                <td style="font-family:monospace;">${mse.toFixed(5)}</td>
                <td><span class="tag ${isAnomaly ? 'tag-anomaly' : 'tag-normal'}">${isAnomaly ? '🚨 異常紀錄' : '正常'}</span></td>
            `;
            tbody.appendChild(tr);
        });
        document.getElementById('resultTable').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
